# KDBP Init — One-Time Onboarding Workflow
name: kdbp-init
description: "Discover project context, explore human purposes, propose and challenge behavioral values, scaffold trajectory system"
author: "Khujta"

# Persona
persona:
  role: "Behavioral Archaeologist + Value Catalyst"
  style: "Curious interviewer, Socratic guide, challenges assumptions respectfully"
  principles:
    - "Values are about PEOPLE, not code — what goes wrong for humans when this fails?"
    - "Direct questions produce surface answers — use elicitation to dig deeper"
    - "Challenge every proposed value: 'convention or conviction?'"
    - "Human has final authority over all values — agent proposes, human decides"

# This workflow does NOT use DBP bookends (it creates them)
dbp_integration:
  enabled: false
  reason: "kdbp-init creates the behavior system — it cannot load from what doesn't exist yet"

# Critical variables from config
config_source: "{project-root}/_kdbp/core/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Paths
behaviors_path: "{project-root}/behaviors"
trajectory_path: "{behaviors_path}/trajectory"
protocol_source: "{project-root}/_kdbp/core/PROTOCOL-v2.md"

# Workflow components
installed_path: "{project-root}/_kdbp/workflows/kdbp-init"
instructions: "{installed_path}/instructions.xml"

# Collaboration — advanced elicitation available in Steps 02 and 05
collaboration:
  advanced_elicitation: "{project-root}/_kdbp/core/advanced-elicitation/workflow.xml"

# Auto-proceed disabled — this workflow is highly interactive
auto_proceed:
  enabled: false

standalone: true

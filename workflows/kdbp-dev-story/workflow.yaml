# KDBP-Enhanced Story Development Workflow
name: kdbp-dev-story
description: "Story implementation using ECC agents with TDD-first development, parallel reviews, and DBP behavioral tracking"
author: "BMad + Khujta"

# ECC Integration - Orchestrator Configuration
ecc_orchestration:
  enabled: true
  orchestrator: "ECC Orchestrator"

  # ECC agents used in this workflow
  agents:
    planner:
      subagent_type: "everything-claude-code:planner"
      model_standard: "sonnet"
      model_complex: "opus"
      max_turns: 7
      purpose: "Implementation planning and risk assessment"
    tdd-guide:
      subagent_type: "everything-claude-code:tdd-guide"
      model_standard: "sonnet"
      model_complex: "opus"
      # No max_turns — iterative implementation needs many turns
      purpose: "Test-driven development, RED-GREEN-REFACTOR cycle"
    build-error-resolver:
      subagent_type: "everything-claude-code:build-error-resolver"
      model: "sonnet"
      max_turns: 5
      purpose: "Fix build/TypeScript errors with minimal diffs"
    code-reviewer:
      subagent_type: "everything-claude-code:code-reviewer"
      model: "sonnet"
      max_turns: 7
      purpose: "Code quality self-review before completion"

  # Workflow sequence
  sequence: "planner -> tdd-guide -> build-error-resolver (on failure) -> code-reviewer"

  # Pre-completion review (code-reviewer only — formal review is via /kdbp-code-review)
  pre_completion_review:
    agents: ["code-reviewer"]
    description: "Quick self-review before marking story review-ready"

# Deep Behavior Protocol Integration
dbp_integration:
  enabled: true
  bookend_pattern: true
  start_step: "step-00-behavior-load"
  end_step: "step-10-story-checkpoint"
  behaviors_path: "{project-root}/behaviors"
  registry: "{behaviors_path}/REGISTRY.md"
  ledger: "{behaviors_path}/trajectory/ledger.md"
  context_tiers:
    hot: "Value handles + last 3 ledger entries (<1,500 tokens)"
    warm: "Never during dev workflows"
    cold: "Story/epic completion checkpoints only"
  graceful_degradation: true
  # All DBP checks gated on {{dbp_active}} flag set in step-00

# Project Knowledge Integration (replaces Atlas - migrated 2026-02-05)
project_knowledge:
  enabled: true
  load_at_session_start: true
  files:
    required:
      - "{project-root}/_kdbp/knowledge/code-review-patterns.md"
      - "{project-root}/_kdbp/knowledge/dbp-workflow-integration.md"
      - "{project-root}/.claude/rules/testing.md"
      - "{project-root}/docs/architecture/<db-patterns>.md  # optional: your DB/architecture doc"
    optional:
      - "{project-root}/docs/architecture/state-management.md"
      - "{project-root}/docs/architecture/component-patterns.md"

# Critical variables from config
config_source: "{project-root}/_kdbp/core/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

sprint_artifacts: "{project-root}/docs/sprint-artifacts"
story_dir: "{sprint_artifacts}/stories"
story_file: ""
context_file: "{story_dir}/{{story_key}}.context.xml"
sprint_status: "{sprint_artifacts}/sprint-status.yaml"

# Project knowledge paths
project_knowledge_path: "{project-root}/_kdbp/knowledge"
project_architecture_path: "{project-root}/docs/architecture"

# Workflow components
installed_path: "{project-root}/_kdbp/workflows/kdbp-dev-story"
instructions: "{installed_path}/instructions.xml"

# Workflow Optimizations (see docs/architecture/plans/ECC-WORKFLOW-OPTIMIZATIONS.md)
workflow_optimizations:
  tdd:
    run_per_edit: true
    avoid_full_suite: true
  validation:
    consolidate_builds: true
    skip_type_check_if_build_passes: true
  progress_tracking:
    mode: "batched"
    batch_at:
      - task_complete
      - story_complete
  knowledge:
    cache_at_session_start: true
    summarize_for_story_type: true
    cache_files:
      - "_kdbp/knowledge/code-review-patterns.md"
      - "_kdbp/knowledge/dbp-workflow-integration.md"
      - ".claude/rules/testing.md"
      - "docs/architecture/<db-patterns>.md  # optional: your DB/architecture doc"
      - "docs/architecture/state-management.md"
      - "docs/architecture/component-patterns.md"

# Branch Guard Configuration
branch_guard:
  enabled: true
  protected_branches: ["main", "develop"]
  branch_from: "develop"
  naming_convention: "feature/{{story_key}}"
  sync_check: true
  auto_create: true
  stash_uncommitted: true

# Story Complexity Classification (determines dual-model agent selection)
story_complexity:
  standard:
    criteria: "≤3 tasks AND ≤10 subtasks AND ≤4 files"
    description: "Planner + TDD Guide run at sonnet"
  complex:
    criteria: ">3 tasks OR >10 subtasks OR >4 files"
    description: "Planner + TDD Guide escalate to opus"

# Mid-Story Sizing Configuration
mid_story_sizing:
  enabled: true
  post_planning_check: true
  per_task_check: true
  pre_review_check: false
  auto_suggest_split: true
  block_on_exceed: false
  record_metrics: true

  thresholds:
    small:
      max_tasks: 2
      max_subtasks: 5
      max_files: 2
    medium:
      max_tasks: 3
      max_subtasks: 10
      max_files: 4
    large:
      max_tasks: 4
      max_subtasks: 15
      max_files: 8
    too_large:
      description: "REQUIRES SPLIT"
      trigger: ">4 tasks OR >15 subtasks OR >8 files"

  growth_alerts:
    file_growth: 3
    subtask_growth: 5
    loc_per_task: 500

standalone: true

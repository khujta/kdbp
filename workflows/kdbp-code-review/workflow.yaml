# KDBP-Enhanced Code Review Workflow
name: kdbp-code-review
description: "Parallel multi-agent code review with adaptive classification and DBP behavioral tracking"
author: "BMad + Khujta"

# ECC Integration - Orchestrator Configuration
ecc_orchestration:
  enabled: true
  orchestrator: "ECC Orchestrator"

  # ECC agents used in this workflow (ALL RUN IN PARALLEL)
  agents:
    code-reviewer:
      subagent_type: "everything-claude-code:code-reviewer"
      model: "sonnet"
      max_turns: 5
      purpose: "Code quality, maintainability, best practices"
    security-reviewer:
      subagent_type: "everything-claude-code:security-reviewer"
      model_standard: "sonnet"
      model_complex: "opus"
      max_turns: 5
      purpose: "OWASP Top 10, secrets, vulnerabilities"
    architect:
      subagent_type: "everything-claude-code:architect"
      model: "opus"
      max_turns: 5
      purpose: "Architecture compliance, patterns, design"
    tdd-guide:
      subagent_type: "everything-claude-code:tdd-guide"
      model: "sonnet"
      max_turns: 5
      purpose: "Test coverage, TDD compliance, test quality"

  parallel_execution: true
  sequence: "[code-reviewer + security-reviewer + architect + tdd-guide] parallel → Review synthesis"

# Deep Behavior Protocol Integration
dbp_integration:
  enabled: true
  bookend_pattern: true
  start_step: "step-00-behavior-load"
  end_step: "step-09-review-checkpoint"
  behaviors_path: "{project-root}/behaviors"
  registry: "{behaviors_path}/REGISTRY.md"
  ledger: "{behaviors_path}/trajectory/ledger.md"
  context_tiers:
    hot: "Value handles + last 3 ledger entries (<1,500 tokens)"
    warm: "Never during dev workflows"
    cold: "Never during code review (no completion checkpoint)"
  graceful_degradation: true

# Project Knowledge Integration
project_knowledge:
  enabled: true
  load_at_session_start: true
  files:
    required:
      - "{project-root}/_kdbp/knowledge/code-review-patterns.md"
      - "{project-root}/_kdbp/knowledge/dbp-workflow-integration.md"
      - "{project-root}/.claude/rules/testing.md"
      - "{project-root}/docs/architecture/<db-patterns>.md  # optional: your DB/architecture doc"
    optional:
      - "{project-root}/docs/architecture/state-management.md"
      - "{project-root}/docs/architecture/component-patterns.md"

# Critical variables from config
config_source: "{project-root}/_kdbp/core/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

sprint_artifacts: "{project-root}/docs/sprint-artifacts"
sprint_status: "{sprint_artifacts}/sprint-status.yaml"

# Project knowledge paths
project_knowledge_path: "{project-root}/_kdbp/knowledge"
project_architecture_path: "{project-root}/docs/architecture"

# Workflow components
installed_path: "{project-root}/_kdbp/workflows/kdbp-code-review"
instructions: "{installed_path}/instructions.xml"

# ECC Adaptive Review Configuration
adaptive_review:
  enabled: true
  thresholds:
    trivial:
      max_tasks: 2
      max_subtasks: 5
      max_files: 3
    simple:
      max_tasks: 4
      max_subtasks: 12
      max_files: 6
    standard:
      max_tasks: 6
      max_subtasks: 20
      max_files: 10
    complex:
      # Anything exceeding standard thresholds

  security_patterns:
    - "**/security/**"
    - "**/functions/**"
    - "**/auth/**"
  architecture_patterns:
    - "**/stores/**"
    - "**/contexts/**"
    - "**/features/**/index.ts"
    - "**/*.types.ts"

  agent_selection:
    trivial: ["code-reviewer"]
    simple: ["code-reviewer", "tdd-guide"]
    standard: ["code-reviewer", "security-reviewer"]
    complex: ["code-reviewer", "security-reviewer", "architect", "tdd-guide"]

  scoring_weights:
    code-reviewer: 40
    security-reviewer: 30
    architect: 20
    tdd-guide: 10

# Context budget settings
context_budget:
  orchestrator_reads_files: true
  agent_reads_files: false
  agent_compact_output: true
  file_count_warning_threshold: 12

# Auto-proceed
auto_proceed:
  enabled: true
  pause_only_at: ["step-5-triage", "step-7-test-health"]

standalone: true

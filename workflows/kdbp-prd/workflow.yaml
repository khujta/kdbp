# KDBP PRD Workflow
name: kdbp-prd
description: "Collaborative product requirements discovery with data-driven classification and DBP behavioral tracking"
author: "BMad + Khujta"

# Persona
persona:
  role: "Product Manager + Requirements Facilitator"
  style: "Structured yet conversational — collaborative peer, not content generator"
  principles:
    - "Collaborative discovery between PM peers"
    - "Push for specific, measurable outcomes"
    - "User journeys drive functional requirements"
    - "No journey = no FR = product doesn't exist"
    - "Capability contract binds all downstream work"

# Deep Behavior Protocol Integration
dbp_integration:
  enabled: true
  bookend_pattern: true
  start_step: "step-00-behavior-load"
  end_step: "step-09-completion"
  behaviors_path: "{project-root}/behaviors"
  registry: "{behaviors_path}/REGISTRY.md"
  ledger: "{behaviors_path}/trajectory/ledger.md"
  graceful_degradation: true

# Critical variables from config
config_source: "{project-root}/_kdbp/core/config.yaml"
output_folder: "{config_source}:output_folder"
planning_artifacts: "{config_source}:planning_artifacts"
product_knowledge: "{config_source}:product_knowledge"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Data files
data_files_path: "{installed_path}/data"
project_types_csv: "{data_files_path}/project-types.csv"
domain_complexity_csv: "{data_files_path}/domain-complexity.csv"
prd_purpose: "{data_files_path}/prd-purpose.md"
prd_template: "{data_files_path}/prd-template.md"

# Output
prd_output: "{planning_artifacts}/prd.md"

# Workflow components
installed_path: "{project-root}/_kdbp/workflows/kdbp-prd"
instructions: "{installed_path}/instructions.xml"

# Collaboration menus (A/P/C) available at each step
collaboration:
  advanced_elicitation: "{project-root}/_kdbp/core/advanced-elicitation/workflow.xml"
  party_mode: true

# Auto-proceed — only pause at ask tags in step files
auto_proceed:
  enabled: true

standalone: true
